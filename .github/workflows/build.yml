name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clean DMG mounts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # Unmount any existing ShowCall volumes
          for vol in /Volumes/ShowCall*; do
            if [ -d "$vol" ]; then
              echo "Unmounting $vol"
              hdiutil detach "$vol" -force || true
            fi
          done

      
      - name: "Debug: show non-secret environment and npm config"
        if: matrix.os == 'macos-latest'
        run: |
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "npm config list --json:" 
          npm config list --json
          echo "Listing /usr/bin and /usr/local/bin for tools:" 
          ls -la /usr/bin | head -n 40 || true
          ls -la /usr/local/bin | head -n 40 || true
        shell: bash

      - name: Check required env vars for macOS build
        if: matrix.os == 'macos-latest'
        run: |
          for var in APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID CSC_LINK CSC_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required env var: $var"
              exit 1
            fi
          done
          echo "✓ All required macOS build secrets are present"
          echo "  - APPLE_ID length: ${#APPLE_ID}"
          echo "  - APPLE_APP_SPECIFIC_PASSWORD length: ${#APPLE_APP_SPECIFIC_PASSWORD}"
          echo "  - APPLE_TEAM_ID: $APPLE_TEAM_ID"
          echo "  - CSC_LINK length: ${#CSC_LINK}"
          echo "  - CSC_KEY_PASSWORD length: ${#CSC_KEY_PASSWORD}"
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: "Build app (macOS) with verbose logging and notarization"
        if: matrix.os == 'macos-latest'
        run: |
          set -o pipefail
          DEBUG=electron-builder,notarize npm run dist 2>&1 | tee build-electron-builder.log
          # copy logs into dist for easier upload
          mkdir -p dist/logs || true
          cp build-electron-builder.log dist/logs/ || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          NOTARIZE_DEBUG: 'true'
        shell: bash

      - name: Build app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build app (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/**
            build-electron-builder.log
            dist/logs/**

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/latest.yml

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            macos-build/*
            linux-build/*
            windows-build/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
